<div class="container-sm">
<div class="formulario">
      <div class="Titulo"><h4>Contactanos</h4></div>
      <section>
        <form id="consulta" action="#" method="post">
          <div class="campo">
            <label for="Nombre">Nombre:</label>
            <br />
            <input type="text" id="Nombre" placeholder="Nombre" />
          </div>
          <div class="campo">
            <label for="Email">Correo Electrónico:</label>
            <br />
            <input type="mail" id="Email" placeholder="Email" />
          </div>
          <div class="campo">
            <label for="Teléfono">Teléfono:</label>
            <br />
            <input type="tel" id="Teléfono" placeholder="Teléfono" />
          </div>
          <div class="msg">
            <label for="Mensaje">Mensaje:</label>
            <br />
            <input
              class="placemsg"
              type="text"
              id="Mensaje"
              placeholder="Mensaje"
            />
          </div>
          <div>
            <div class="d-grid gap-2">
  <button class="btn btn-primary" type="submit">Enviar</button>
</div>
          </div>
      </section>
      </div>
      </div>
      <summary>La biblioteca se encuentra abierta al publico los dias:</summary>
      <ul>
        <li>Lunes a Vierdes de 10 a 18 Hs.</li>
      </ul>
    </div>
