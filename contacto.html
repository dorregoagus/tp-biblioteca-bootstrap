<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contactos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/contacto.css" />
  </head>
  <body>
    <h1>Biblioteca</h1>
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="index.html"
          >Inicio</a
        >
      </li>
      <li class="nav-item">
        <a class="nav-link" href="nosotros.html">Nosotros</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="servicios.html">Servicios</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="contacto.html">Contacto</a>
      </li>
    </ul>
    <section>
      <div class="titulo">
        <h1 id="tituloh1">
          Contactanos
          <p id="titulop">Estamos para ayudarte</p>
        </h1>
        <div class="container-md">
          <div class="container px-4 text-center">
            <div class="row gx-5">
              <div class="col">
                <div class="p-3">
                  <div class="formulario">
                    <div><h4>ENVIANOS UN MENSAJE</h4></div>

                    <form id="consulta" action="#" method="post">
                      <div class="campo">
                        <label for="Nombre">Nombre:</label>
                        <br />
                        <input
                          type="text"
                          id="Nombre"
                          placeholder="Tu nombre"
                        />
                      </div>
                      <div class="campo">
                        <label for="Email">Correo Electrónico:</label>
                        <br />
                        <input
                          type="mail"
                          id="Email"
                          placeholder="correo@ejemplo.com"
                        />
                      </div>
                      <div class="campo">
                        <label for="Teléfono">Teléfono:</label>
                        <br />
                        <input
                          type="tel"
                          id="Teléfono"
                          placeholder="+54 370 000 0000"
                        />
                      </div>
                      <div class="msg">
                        <label for="mensaje">Mensaje</label>
                        <br />
                        <textarea
                          class="place-msg"
                          id="Mensaje"
                          placeholder="En que podemos ayudarte?"
                        ></textarea>
                      </div>
                      <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="submit">
                          Enviar
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
              <div class="col">
                <div class="p-3">
                  <div class="horario">
                    <h3>Horario</h3>
                    <p>
                      La biblioteca se encuentra abierta al público
                      <br />
                      de lunes a viernes de 10 a 18 Hs.
                      <br />
                      Formosa, Argentina Teléfono +54 370 4293179
                      <br />
                      biblioteca@argentina.gob.ar
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
